<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #f38f7e, #e65100);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .price {
            font-size: 28px;
            color: #e65100;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .btn {
            text-decoration: none;
            background-color: #00695c;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #004d40;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🏠</div>
        <h2>Predicted House Price</h2>
        <div class="price">₹ {{ prediction | round(2) }}</div>
        <a class="btn" href="/predict">🔁 Predict Another</a>
    </div>
</body>
</html>
